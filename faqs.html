<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQs — RideIndia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <header id="site-header" data-active="faqs.html"></header>

  <main class="page">
    <section class="page-hero page-hero--img" style="--hero-img: url('assets/img/37cecc12dfda.png');">
      <div class="container">
        <h1>Frequently Asked Questions</h1>
        <p>Find fast, transparent answers regarding our vehicles, policies, cancellations, and support in India.</p>
        <div class="page-hero__search field" data-field style="margin-top: var(--space-8);">
          <div class="field__control"><i data-icon="search"></i>
            <input id="faq-search" type="search" placeholder="Type your question here (e.g., security deposit, insurance…)">
          </div>
        </div>
      </div>
    </section>

    <div class="container" style="padding-block: var(--space-16);">
      <div class="legal-layout">
        <nav class="legal-toc" id="faq-cats" aria-label="FAQ categories"></nav>
        <div id="faq-content"></div>
      </div>

      <section class="cta-band" style="border-radius: var(--radius-xl); margin-top: var(--space-16);">
        <div class="cta-band__inner" style="padding-block: var(--space-16);">
          <h2 style="font-size: var(--fs-h2);">Still have questions?</h2>
          <p>We are available 24/7. Get in touch with our team for immediate assistance.</p>
          <div class="cta-band__actions">
            <a class="btn btn--light btn--lg" href="contact-us.html">Contact Support</a>
            <a class="btn btn--outline-light btn--lg" href="help-center.html">Call Helpline</a>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/icons.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/data.js"></script>
  <script src="js/faqs.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
