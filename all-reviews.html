<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Reviews — RideIndia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body style="background: var(--color-surface);">
  
  <header id="site-header" data-active="index.html"></header>

  <main class="page">
    <div class="container" style="padding-block: var(--space-12);">
      <div style="margin-bottom: var(--space-8);">
        <h1 style="font-family: var(--font-head); font-weight: 800; font-size: var(--fs-h1);">Customer Reviews</h1>
        <p style="color: var(--color-muted);">Real stories from thousands of RideIndia customers across the country.</p>
      </div>

      <section class="reviews-summary reveal">
        <div class="reviews-score">
          <b>4.8</b>
          <div class="stars" id="summary-stars"></div>
          <small>128 Total Reviews</small>
        </div>
        <div style="flex:1; min-width: 280px;" id="rating-breakdown"></div>
        <div style="text-align:center;">
          <p style="color: var(--color-muted); font-size: var(--fs-sm); margin-bottom: var(--space-4);">Share your experience with our community</p>
          <button class="btn btn--primary" data-auth-open="login">Write a Review</button>
        </div>
      </section>

      <div class="toolbar" style="justify-content: space-between; margin-bottom: var(--space-8);">
        <div class="filter-chips" id="review-filters"></div>
        <div class="select" id="review-sort" aria-expanded="false">
          <button class="select__button" type="button">Sort: <span id="rsort-label">Most Recent</span> <i data-icon="chevron-down"></i></button>
          <div class="select__menu" role="listbox">
            <button class="select__option is-active" data-sort="recent" role="option">Most Recent</button>
            <button class="select__option" data-sort="high" role="option">Highest Rated</button>
            <button class="select__option" data-sort="low" role="option">Lowest Rated</button>
          </div>
        </div>
      </div>

      <div class="review-list" id="review-list"></div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/icons.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/data.js"></script>
  <script src="js/reviews.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
